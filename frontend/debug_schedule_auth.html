<!DOCTYPE html>
<html>
<head>
    <title>Schedule Auth Debug</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .success { background-color: #d4edda; }
        .error { background-color: #f8d7da; }
        .warning { background-color: #fff3cd; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>🔍 Schedule Authentication Debug</h1>
    
    <div class="debug-section">
        <h2>🧪 Authentication Check</h2>
        <button onclick="checkAuth()">Check Authentication</button>
        <button onclick="testCourses()">Test Courses API</button>
        <button onclick="simulateLogin()">Simulate Login</button>
        <button onclick="clearStorage()">Clear Storage</button>
    </div>
    
    <div id="debug-info"></div>
    
    <script>
        const API_BASE_URL = 'http://localhost:8000';
        const debugInfo = document.getElementById('debug-info');
        
        function getAuthToken() {
            return localStorage.getItem('token');
        }
        
        function getUser() {
            const userStr = localStorage.getItem('user');
            return userStr ? JSON.parse(userStr) : null;
        }
        
        function checkAuth() {
            const section = document.createElement('div');
            section.className = 'debug-section';
            
            const token = getAuthToken();
            const user = getUser();
            
            let html = '<h3>🔍 Authentication Status</h3>';
            html += `<p><strong>Token:</strong> ${token ? '✅ Found' : '❌ Not found'}</p>`;
            if (token) {
                html += `<p><strong>Token Length:</strong> ${token.length}</p>`;
                html += `<p><strong>Token Preview:</strong> ${token.substring(0, 50)}...</p>`;
                
                // Decode JWT token
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    html += `<p><strong>Token User ID:</strong> ${payload.user_id}</p>`;
                    html += `<p><strong>Token Email:</strong> ${payload.sub}</p>`;
                    html += `<p><strong>Token Expires:</strong> ${new Date(payload.exp * 1000).toLocaleString()}</p>`;
                } catch (e) {
                    html += `<p><strong>Token Decode Error:</strong> ${e.message}</p>`;
                }
            }
            
            html += `<p><strong>User:</strong> ${user ? '✅ Found' : '❌ Not found'}</p>`;
            if (user) {
                html += `<p><strong>User ID:</strong> ${user.id}</p>`;
                html += `<p><strong>User Email:</strong> ${user.email}</p>`;
            }
            
            section.innerHTML = html;
            debugInfo.appendChild(section);
        }
        
        async function testCourses() {
            const section = document.createElement('div');
            section.className = 'debug-section loading';
            section.innerHTML = `<h3>🔍 Testing Courses API...</h3>`;
            debugInfo.appendChild(section);
            
            const token = getAuthToken();
            if (!token) {
                section.className = 'debug-section error';
                section.innerHTML = `<h3>❌ No Token Found</h3><p>Please login first.</p>`;
                return;
            }
            
            try {
                console.log('Testing courses with token:', token.substring(0, 50));
                
                const response = await fetch(`${API_BASE_URL}/courses/`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                    },
                });
                
                console.log('Courses response:', response.status, response.statusText);
                
                if (response.ok) {
                    const courses = await response.json();
                    section.className = 'debug-section success';
                    let html = `<h3>✅ Courses API Success</h3>`;
                    html += `<p><strong>Status:</strong> ${response.status}</p>`;
                    html += `<p><strong>Courses Found:</strong> ${courses.length}</p>`;
                    
                    if (courses.length > 0) {
                        html += `<h4>Courses:</h4>`;
                        courses.forEach(course => {
                            html += `<p>- ${course.name} (${course.code}) on ${course.day} - User ID: ${course.user_id}</p>`;
                        });
                    }
                    
                    section.innerHTML = html;
                } else {
                    const errorText = await response.text();
                    section.className = 'debug-section error';
                    section.innerHTML = `
                        <h3>❌ Courses API Failed</h3>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Error:</strong> ${errorText}</p>
                    `;
                }
            } catch (error) {
                console.error('Courses test error:', error);
                section.className = 'debug-section error';
                section.innerHTML = `
                    <h3>❌ Network Error</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                    <pre>${error.stack}</pre>
                `;
            }
        }
        
        async function simulateLogin() {
            const section = document.createElement('div');
            section.className = 'debug-section loading';
            section.innerHTML = `<h3>🔍 Simulating Login...</h3>`;
            debugInfo.appendChild(section);
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'test123456'
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    
                    // Extract user info from token
                    const tokenPayload = JSON.parse(atob(data.access_token.split('.')[1]));
                    const user = {
                        id: tokenPayload.user_id,
                        email: tokenPayload.sub
                    };
                    
                    // Save to localStorage
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(user));
                    
                    section.className = 'debug-section success';
                    section.innerHTML = `
                        <h3>✅ Login Simulated</h3>
                        <p><strong>Token Saved:</strong> ${data.access_token.substring(0, 50)}...</p>
                        <p><strong>User ID:</strong> ${user.id}</p>
                        <p><strong>Email:</strong> ${user.email}</p>
                    `;
                    
                    // Auto-test courses after login
                    setTimeout(testCourses, 1000);
                } else {
                    const errorText = await response.text();
                    section.className = 'debug-section error';
                    section.innerHTML = `
                        <h3>❌ Login Failed</h3>
                        <p><strong>Error:</strong> ${errorText}</p>
                    `;
                }
            } catch (error) {
                section.className = 'debug-section error';
                section.innerHTML = `
                    <h3>❌ Login Error</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                `;
            }
        }
        
        function clearStorage() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            
            const section = document.createElement('div');
            section.className = 'debug-section warning';
            section.innerHTML = `<h3>🗑️ Storage Cleared</h3><p>Token and user data removed.</p>`;
            debugInfo.appendChild(section);
        }
        
        // Auto-check auth on load
        checkAuth();
    </script>
</body>
</html>
