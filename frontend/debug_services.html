<!DOCTYPE html>
<html>
<head>
    <title>Services Debug</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .success { background-color: #d4edda; }
        .error { background-color: #f8d7da; }
        .warning { background-color: #fff3cd; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
        .loading { color: #666; }
    </style>
</head>
<body>
    <h1>🔍 Frontend Services Debug</h1>
    <div id="debug-info"></div>
    
    <script>
        const debugInfo = document.getElementById('debug-info');
        const API_BASE = 'http://127.0.0.1:8000';
        
        const services = [
            { name: 'Weather', url: `${API_BASE}/weather/current`, type: 'weather' },
            { name: 'Weather Forecast', url: `${API_BASE}/weather/forecast?days=5`, type: 'weather' },
            { name: 'Meals ÖSEM', url: `${API_BASE}/meals/osem`, type: 'meals' },
            { name: 'Meals KYK', url: `${API_BASE}/meals/kyk`, type: 'meals' },
            { name: 'Bus Schedule', url: `${API_BASE}/bus/schedule`, type: 'bus' },
            { name: 'Calendar', url: `${API_BASE}/calendar`, type: 'calendar' }
        ];
        
        async function testService(service) {
            const section = document.createElement('div');
            section.className = 'debug-section loading';
            section.innerHTML = `<h3>🔍 Testing ${service.name}...</h3>`;
            debugInfo.appendChild(section);
            
            try {
                console.log(`Testing ${service.name}: ${service.url}`);
                
                const startTime = Date.now();
                const response = await fetch(service.url);
                const endTime = Date.now();
                const responseTime = endTime - startTime;
                
                console.log(`${service.name} response:`, response.status, response.statusText);
                
                if (response.ok) {
                    const data = await response.json();
                    section.className = 'debug-section success';
                    section.innerHTML = `
                        <h3>✅ ${service.name}</h3>
                        <p><strong>Status:</strong> ${response.status} (${response.statusText})</p>
                        <p><strong>Response Time:</strong> ${responseTime}ms</p>
                        <p><strong>Data Type:</strong> ${Array.isArray(data) ? `Array (${data.length} items)` : typeof data}</p>
                        ${Array.isArray(data) ? 
                            `<p><strong>First Item:</strong></p><pre>${JSON.stringify(data[0], null, 2)}</pre>` :
                            `<p><strong>Keys:</strong> ${Object.keys(data).join(', ')}</p>`
                        }
                    `;
                } else {
                    const errorText = await response.text();
                    section.className = 'debug-section error';
                    section.innerHTML = `
                        <h3>❌ ${service.name}</h3>
                        <p><strong>Status:</strong> ${response.status} (${response.statusText})</p>
                        <p><strong>Response Time:</strong> ${responseTime}ms</p>
                        <p><strong>Error:</strong></p><pre>${errorText}</pre>
                    `;
                }
            } catch (error) {
                console.error(`${service.name} error:`, error);
                section.className = 'debug-section error';
                section.innerHTML = `
                    <h3>❌ ${service.name}</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                    <p><strong>URL:</strong> ${service.url}</p>
                    <pre>${error.stack}</pre>
                `;
            }
        }
        
        // Test all services
        async function testAllServices() {
            debugInfo.innerHTML = '<h2>🧪 Testing All Services...</h2>';
            
            for (const service of services) {
                await testService(service);
                // Small delay between requests
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            
            // Add network info
            const networkSection = document.createElement('div');
            networkSection.className = 'debug-section';
            networkSection.innerHTML = `
                <h3>🌐 Network Information</h3>
                <p><strong>Current URL:</strong> ${window.location.href}</p>
                <p><strong>API Base:</strong> ${API_BASE}</p>
                <p><strong>User Agent:</strong> ${navigator.userAgent}</p>
                <p><strong>Online:</strong> ${navigator.onLine ? 'Yes' : 'No'}</p>
            `;
            debugInfo.appendChild(networkSection);
        }
        
        // Run tests
        testAllServices();
    </script>
</body>
</html>
