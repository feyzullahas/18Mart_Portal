<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Cevrimdisi | 18 Mart Portal</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0d1117;
      --card: #161b22;
      --text: #e6edf3;
      --muted: #9da7b3;
      --accent: #3b82f6;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #111827;
        --muted: #4b5563;
        --accent: #1d4ed8;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1f2937 0%, var(--bg) 45%);
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.25);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.35rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.95rem;
    }

    a {
      display: inline-block;
      margin-top: 18px;
      text-decoration: none;
      color: #fff;
      background: var(--accent);
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Internet baglantisi yok</h1>
    <p>Baglanti geri geldiginde sayfa otomatik olarak guncellenebilir. Lutfen interneti kontrol edip tekrar deneyin.</p>
    <a href="/">Ana sayfaya don</a>
  </main>
</body>
</html>
