<!doctype html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="18 Mart Universitesi ogrencileri icin kampus bilgi portali." />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="18 Mart Portal" />

  <link rel="manifest" href="/manifest.json?v=20260428" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <title>18 Mart Portal</title>
  <script>
    window.addEventListener('error', function(e) {
      var isSyntaxError = e.message && (e.message.indexOf('Unexpected token') !== -1 || e.message.indexOf('expected expression') !== -1 || e.message.indexOf('SyntaxError') !== -1);
      var isScriptError = e.target && e.target.nodeName === 'SCRIPT';
      if (isSyntaxError || isScriptError) {
        var reloadKey = 'portal_auto_reload_v2';
        if (!sessionStorage.getItem(reloadKey)) {
          sessionStorage.setItem(reloadKey, 'true');
          console.warn('Gecersiz JS onbellek algilandi, SW temizleniyor ve yenileniyor...');
          var promises = [];
          if ('serviceWorker' in navigator) {
            promises.push(navigator.serviceWorker.getRegistrations().then(function(regs) {
              return Promise.all(regs.map(function(reg) { return reg.unregister(); }));
            }).catch(function(){}));
          }
          if ('caches' in window) {
            promises.push(caches.keys().then(function(names) {
              return Promise.all(names.map(function(name) { return caches.delete(name); }));
            }).catch(function(){}));
          }
          Promise.all(promises).then(function() {
            window.location.reload();
          }).catch(function() {
            setTimeout(function() { window.location.reload(); }, 500);
          });
        }
      }
    }, true);
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
